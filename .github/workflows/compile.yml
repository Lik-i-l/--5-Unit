  test-lab4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (lab4)
        run: |
          cd lab4
          npm install
      - name: Compile TypeScript to JavaScript (lab4)
        run: |
          cd lab4
          npm run build
      - name: Show compiled JavaScript (lab4)
        run: |
          cd lab4
          cat dist/index.js
      - name: Run the program (lab4)
        run: |
          cd lab4
          node dist/index.js
      - name: Test Lab4
        run: |
          cd lab4
          npm test
