name: Test Cat

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-cat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test Cat
        run: npm test
