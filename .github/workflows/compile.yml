name: Test all labs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-cat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test Cat (Задание 1)
        run: npm test

  test-lab3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test Lab3 (Math)
        run: |
          cd lab3
          npm install
          npm test
